<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BARUS Management System</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

  <h1>BARUS MANAGEMENT SYSTEM</h1>

  <!-- KPI -->

  <div class="cards">

    <div class="card total">
      <h3>Total Case</h3>
      <p id="totalCase">0</p>
    </div>

    <div class="card open">
      <h3>Open Case</h3>
      <p id="openCase">0</p>
    </div>

    <div class="card clear">
      <h3>Clear</h3>
      <p id="clearCase">0</p>
    </div>

    <div class="card approve">
      <h3>Approve</h3>
      <p id="approveCase">0</p>
    </div>

  </div>

  <!-- ROW 1 -->

  <div class="dashboard-grid">

    <div class="chart-container">
      <h2>CASE BY BRAND</h2>
      <canvas id="brandChart"></canvas>
    </div>

    <div class="chart-container">
      <h2>CASE BY STATUS</h2>
      <canvas id="statusChart"></canvas>
    </div>

  </div>

  <!-- ROW 2 -->

  <div class="dashboard-grid">

    <div class="chart-container">
      <h2>CASE BY DEPARTMENT</h2>
      <canvas id="departmentChart"></canvas>
    </div>

    <div class="chart-container">
      <h2>AGING DISTRIBUTION</h2>
      <canvas id="agingChart"></canvas>
    </div>

  </div>

  <!-- TABLE -->

  <div class="table-container">

    <h2>TOP 20 OLDEST CASE</h2>

    <table id="oldestTable">

      <thead>

        <tr>
          <th>ID CASE</th>
          <th>BRAND</th>
          <th>STATUS</th>
          <th>AGING</th>
          <th>RESPONSIBILITY</th>
        </tr>

      </thead>

      <tbody></tbody>

    </table>

  </div>

  <div id="lastUpdate">

    Last Update : Loading...

  </div>

  <script src="app.js"></script>

</body>

</html>
